<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Maxconfort | Premium</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

    <style>
        body {
            background: radial-gradient(circle at center, #111118 0%, #050505 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.4;
        }

        .brand-title { 
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            margin-top: 60px;
            opacity: 0;
            transform: translateY(20px);
            animation: revealUltraFast 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255,255,255,0.2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(37, 99, 235, 0.3));
            letter-spacing: -2px;
        }

        @keyframes revealUltraFast { 
            to { opacity: 1; transform: translateY(0); } 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .glass-card:hover::after {
            left: 100%;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: #2563eb;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        #calendar {
            background: #fff;
            color: #000;
            border-radius: 30px;
            padding: 25px;
        }
    </style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<h1 class="brand-title">
    Max<span style="color: #2563eb; -webkit-text-fill-color: #2563eb;">confort</span>
</h1>

<div class="container py-5">
    
    <div class="row g-4 justify-content-center mb-5">

        <a href="/stock" class="col-md-4 card glass-card p-4 text-center text-decoration-none">
            <h3 class="m-0 fw-bold text-white" style="letter-spacing: 2px;">INVENTARIO</h3>
        </a>

        <a href="/clientes" class="col-md-4 card glass-card p-4 text-center text-decoration-none">
            <h3 class="m-0 fw-bold text-white" style="letter-spacing: 2px;">CLIENTES</h3>
        </a>

        <a href="/resumen" class="col-md-4 card glass-card p-4 text-center text-decoration-none">
            <h3 class="m-0 fw-bold text-white" style="letter-spacing: 2px;">RESUMEN</h3>
        </a>

    </div>

    <div class="card glass-card p-5">
        <div id="calendar"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let pts = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pts = [];
        for (let i = 0; i < 60; i++) {
            pts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        pts.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

            for (let j = i + 1; j < pts.length; j++) {
                let d = Math.hypot(p.x - pts[j].x, pts[j].y - p.y);
                if (d < 200) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(pts[j].x, pts[j].y);
                    ctx.strokeStyle = `rgba(37,99,235,${0.1 * (1 - d / 200)})`;
                    ctx.stroke();
                }
            }
        });

        requestAnimationFrame(draw);
    }

    window.onresize = init;
    init();
    draw();

    document.addEventListener('DOMContentLoaded', function () {
        new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'es',
            events: '/clientes/eventos_cobro'
        }).render();
    });
</script>

</body>
</html>
