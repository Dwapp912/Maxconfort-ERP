<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - Maxconfort</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #121212; 
        }
        .card { 
            width: 350px; 
            border-radius: 15px; 
            border: none; 
        }
        .position-relative .btn-sm {
            height: 31px;
        }
    </style>
</head>
<body>
    <div class="card shadow-lg p-4 bg-dark text-light border border-secondary">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">MAX<span class="text-light">CONFORT</span></h3>
            <p class="text-muted small">Ingresá tus credenciales</p>
        </div>
        <form action="/login" method="POST">
            <div class="mb-3 position-relative">
                <label class="form-label small">Usuario</label>
                <input type="text" id="loginUser" name="username" class="form-control form-control-sm bg-dark border-secondary text-white pe-5" required>
                <button type="button" class="btn btn-sm position-absolute bottom-0 end-0 mb-1 text-white opacity-50" 
                        onclick="document.getElementById('loginUser').value='';">
                    ✕
                </button>
            </div>
            <div class="mb-3">
                <label class="form-label small">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-sm bg-dark border-secondary text-white" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold btn-sm">ENTRAR</button>
        </form>
    </div>
</body>
</html>
